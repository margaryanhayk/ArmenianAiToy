<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parent Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f6f4fb;
      color: #2b1f47;
      min-height: 100vh;
      padding: 16px;
    }
    .app { max-width: 720px; margin: 0 auto; }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 4px 20px;
    }
    .header h1 { font-size: 22px; color: #5b3e8a; }
    .header .sub { font-size: 12px; color: #9a8ab5; }
    .header .right { display: flex; gap: 8px; align-items: center; }

    .card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(91,62,138,0.08);
      margin-bottom: 14px;
    }
    .card h2 { font-size: 15px; color: #5b3e8a; margin-bottom: 12px; }

    label { display: block; font-size: 12px; color: #6b5b8a; margin-bottom: 4px; }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #e0d6f0;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 12px;
    }
    button {
      padding: 9px 14px;
      background: #7c5cbf;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { background: #6b4aad; }
    button.secondary { background: #e0d6f0; color: #5b3e8a; }
    button.secondary:hover { background: #d0c2e8; }
    button.link {
      background: none;
      color: #7c5cbf;
      padding: 0;
      font-size: 13px;
      text-decoration: underline;
    }
    button.link:hover { background: none; color: #5b3e8a; }
    button:disabled,
    button.secondary:disabled {
      background: #ece4f8;
      color: #b8a8d6;
      cursor: not-allowed;
    }
    button:focus-visible,
    .row:focus-visible {
      outline: 2px solid #7c5cbf;
      outline-offset: 2px;
    }

    .device-context {
      font-size: 12px;
      color: #6b5b8a;
      margin-top: 6px;
      margin-bottom: 10px;
      word-break: break-all;
    }
    .device-context strong { color: #5b3e8a; }

    .pager-info {
      font-size: 12px;
      color: #9a8ab5;
      text-align: center;
      margin-top: 6px;
    }

    .tabs {
      display: inline-flex;
      gap: 6px;
      margin: 0 8px;
      vertical-align: middle;
    }
    .tabs button {
      padding: 5px 12px;
      font-size: 12px;
      background: #ece4f8;
      color: #5b3e8a;
      border-radius: 999px;
    }
    .tabs button:hover { background: #d8c8f0; }
    .tabs button.active { background: #7c5cbf; color: white; }
    .tabs button.active:hover { background: #6b4aad; }

    .status { font-size: 13px; padding: 8px 0; min-height: 20px; }
    .status.err { color: #c62828; }
    .status.muted { color: #9a8ab5; }

    .row {
      display: block;
      width: 100%;
      text-align: left;
      background: #faf7ff;
      border: 1px solid #ece4f8;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      font-size: 14px;
      color: #2b1f47;
    }
    .row:hover { background: #f0e8fc; }

    .row .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 12px;
      color: #6b5b8a;
    }
    .row .snippet {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #4b3b6e;
      margin-top: 2px;
    }
    .row .snippet.assistant { color: #7c5cbf; }
    .row .content-block {
      color: #2b1f47;
      margin-top: 4px;
      white-space: pre-wrap;
      word-wrap: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .row .from-line {
      font-size: 11px;
      color: #9a8ab5;
      margin-top: 6px;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #fce4ec;
      color: #c62828;
      margin-left: 6px;
      vertical-align: middle;
    }
    .badge.warn { background: #fff3e0; color: #e65100; }
    .badge.muted { background: #ece4f8; color: #6b5b8a; }
    .role-tag {
      display: inline-block;
      font-size: 11px;
      color: #6b5b8a;
      margin-left: 6px;
      vertical-align: middle;
    }

    .msg {
      border-left: 3px solid #e0d6f0;
      padding: 8px 12px;
      margin-bottom: 10px;
      background: #faf7ff;
      border-radius: 0 8px 8px 0;
    }
    .msg.flagged { border-left-color: #c62828; background: #fff5f6; }
    .msg.flagged.warn { border-left-color: #e65100; background: #fff8f0; }
    .msg .meta {
      font-size: 11px;
      color: #9a8ab5;
      margin-bottom: 4px;
    }
    .msg .role {
      font-weight: 600;
      color: #5b3e8a;
      margin-right: 8px;
    }
    .msg .body {
      font-size: 14px;
      color: #2b1f47;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .pager {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }

    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div>
        <h1>Parent Dashboard</h1>
        <div class="sub">Read-only conversation viewer</div>
      </div>
      <div class="right">
        <button id="logoutBtn" class="secondary" hidden>Log out</button>
      </div>
    </div>

    <!-- Login view -->
    <section id="loginView" class="card" hidden>
      <h2>Log in</h2>
      <label for="emailInput">Email</label>
      <input id="emailInput" type="email" autocomplete="username">
      <label for="passwordInput">Password</label>
      <input id="passwordInput" type="password" autocomplete="current-password">
      <button id="loginBtn">Log in</button>
      <div id="loginStatus" class="status" aria-live="polite"></div>
    </section>

    <!-- Devices view -->
    <section id="devicesView" class="card" hidden>
      <h2>Linked devices</h2>
      <div id="devicesList"></div>
      <div id="devicesStatus" class="status muted" aria-live="polite"></div>
    </section>

    <!-- Summaries view -->
    <section id="summariesView" class="card" hidden>
      <h2>
        <button class="link" id="backToDevices" aria-label="Back to devices">← Devices</button>
        <span class="tabs" role="tablist" aria-label="Device views">
          <button data-tab="summaries" role="tab" aria-selected="false">Conversations</button>
          <button data-tab="flagged" role="tab" aria-selected="false">Flagged</button>
        </span>
      </h2>
      <div id="summariesDeviceContext" class="device-context"></div>
      <div id="summariesList"></div>
      <div id="summariesStatus" class="status muted" aria-live="polite"></div>
      <div class="pager">
        <button id="newerBtn" class="secondary" aria-label="Newer page">← Newer</button>
        <button id="olderBtn" class="secondary" aria-label="Older page">Older →</button>
      </div>
      <div id="summariesPagerInfo" class="pager-info"></div>
    </section>

    <!-- Flagged view -->
    <section id="flaggedView" class="card" hidden>
      <h2>
        <button class="link" id="flaggedBackToDevices" aria-label="Back to devices">← Devices</button>
        <span class="tabs" role="tablist" aria-label="Device views">
          <button data-tab="summaries" role="tab" aria-selected="false">Conversations</button>
          <button data-tab="flagged" role="tab" aria-selected="false">Flagged</button>
        </span>
      </h2>
      <div id="flaggedDeviceContext" class="device-context"></div>
      <div id="flaggedList"></div>
      <div id="flaggedStatus" class="status muted" aria-live="polite"></div>
      <div class="pager">
        <button id="flaggedNewerBtn" class="secondary" aria-label="Newer page">← Newer</button>
        <button id="flaggedOlderBtn" class="secondary" aria-label="Older page">Older →</button>
      </div>
      <div id="flaggedPagerInfo" class="pager-info"></div>
    </section>

    <!-- Detail view -->
    <section id="detailView" class="card" hidden>
      <h2><button class="link" id="backFromDetailBtn" aria-label="Back to list">← Back</button></h2>
      <div id="detailMeta" class="status muted" aria-live="polite"></div>
      <div id="detailMessages"></div>
      <div id="detailStatus" class="status" aria-live="polite"></div>
    </section>
  </div>

  <script>
  (function () {
    'use strict';

    // ---------- state ----------
    var TOKEN_KEY = 'areg_parent_token';
    var PAGE_SIZE = 20;
    var state = {
      currentDeviceId: null,
      offset: 0,
      flaggedOffset: 0,
      backFromDetail: null,
      lastSummariesPageSize: 0,
      lastFlaggedPageSize: 0
    };

    // ---------- helpers ----------
    function getToken() { return sessionStorage.getItem(TOKEN_KEY); }
    function setToken(t) { sessionStorage.setItem(TOKEN_KEY, t); }
    function clearToken() { sessionStorage.removeItem(TOKEN_KEY); }

    function show(viewId) {
      var ids = ['loginView', 'devicesView', 'summariesView', 'flaggedView', 'detailView'];
      for (var i = 0; i < ids.length; i++) {
        document.getElementById(ids[i]).hidden = (ids[i] !== viewId);
      }
      document.getElementById('logoutBtn').hidden = (viewId === 'loginView');
    }

    function setStatus(elId, text, kind) {
      var el = document.getElementById(elId);
      el.textContent = text || '';
      el.className = 'status' + (kind ? ' ' + kind : '');
    }

    function clearChildren(el) {
      while (el.firstChild) el.removeChild(el.firstChild);
    }

    function fmtTime(iso) {
      if (!iso) return '';
      try { return new Date(iso).toLocaleString(); } catch (e) { return iso; }
    }

    function shortId(guid) {
      if (!guid) return '';
      return String(guid).slice(0, 8) + '…';
    }

    function roleLabel(role) {
      if (role === 'user') return 'Child';
      if (role === 'assistant') return 'Assistant';
      return String(role || '');
    }

    function setActiveTab(name) {
      var tabs = document.querySelectorAll('.tabs button');
      for (var i = 0; i < tabs.length; i++) {
        var isActive = tabs[i].getAttribute('data-tab') === name;
        tabs[i].classList.toggle('active', isActive);
        tabs[i].setAttribute('aria-selected', isActive ? 'true' : 'false');
      }
    }

    function renderDeviceContext(elId) {
      var el = document.getElementById(elId);
      clearChildren(el);
      if (!state.currentDeviceId) return;
      var label = document.createElement('strong');
      label.textContent = 'Device ' + shortId(state.currentDeviceId);
      var full = document.createElement('span');
      full.textContent = ' · ' + state.currentDeviceId;
      el.appendChild(label);
      el.appendChild(full);
    }

    function updatePager(newerBtnId, olderBtnId, infoId, offset, lastPageSize) {
      var newerBtn = document.getElementById(newerBtnId);
      var olderBtn = document.getElementById(olderBtnId);
      var info = document.getElementById(infoId);
      newerBtn.disabled = (offset === 0);
      // Disable Older when the just-loaded page was empty or short (last page).
      olderBtn.disabled = (lastPageSize < PAGE_SIZE);
      var page = Math.floor(offset / PAGE_SIZE) + 1;
      info.textContent = 'Page ' + page;
    }

    // ---------- fetch wrapper ----------
    function authedFetch(url) {
      var token = getToken();
      if (!token) {
        return Promise.reject({ status: 401, message: 'No token' });
      }
      return fetch(url, {
        headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/json' }
      }).then(function (res) {
        if (res.status === 401) {
          clearToken();
          show('loginView');
          setStatus('loginStatus', 'Session expired. Please log in again.', 'err');
          return Promise.reject({ status: 401, message: 'Unauthorized' });
        }
        if (!res.ok) {
          return Promise.reject({ status: res.status, message: 'HTTP ' + res.status });
        }
        return res.json();
      });
    }

    // ---------- login ----------
    function doLogin() {
      var email = document.getElementById('emailInput').value.trim();
      var password = document.getElementById('passwordInput').value;
      if (!email || !password) {
        setStatus('loginStatus', 'Email and password are required.', 'err');
        return;
      }
      setStatus('loginStatus', 'Logging in…', 'muted');
      fetch('/api/parents/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: password })
      }).then(function (res) {
        if (res.status === 401) {
          setStatus('loginStatus', 'Invalid email or password.', 'err');
          return null;
        }
        if (!res.ok) {
          setStatus('loginStatus', 'Error: HTTP ' + res.status, 'err');
          return null;
        }
        return res.json();
      }).then(function (data) {
        if (!data) return;
        if (!data.token) {
          setStatus('loginStatus', 'Login response missing token.', 'err');
          return;
        }
        setToken(data.token);
        setStatus('loginStatus', '', '');
        document.getElementById('passwordInput').value = '';
        loadDevices();
      }).catch(function () {
        setStatus('loginStatus', 'Network error.', 'err');
      });
    }

    function doLogout() {
      clearToken();
      state.currentDeviceId = null;
      state.offset = 0;
      state.flaggedOffset = 0;
      state.backFromDetail = null;
      state.lastSummariesPageSize = 0;
      state.lastFlaggedPageSize = 0;
      show('loginView');
      setStatus('loginStatus', '', '');
    }

    // ---------- devices ----------
    function loadDevices() {
      show('devicesView');
      setStatus('devicesStatus', 'Loading…', 'muted');
      var listEl = document.getElementById('devicesList');
      clearChildren(listEl);
      authedFetch('/api/parents/devices/details').then(function (data) {
        var devices = (data && data.devices) || [];
        if (devices.length === 0) {
          setStatus('devicesStatus', 'No devices linked to this account yet.', 'muted');
          return;
        }
        setStatus('devicesStatus', '', '');
        devices.forEach(function (d) {
          var btn = document.createElement('button');
          btn.className = 'row';
          btn.title = d.deviceId;
          var top = document.createElement('div');
          top.className = 'top';
          var label = document.createElement('span');
          label.textContent = d.deviceName || ('Device ' + shortId(d.deviceId));
          var hint = document.createElement('span');
          hint.textContent = 'View conversations →';
          top.appendChild(label);
          top.appendChild(hint);
          btn.appendChild(top);

          var details = [];
          if (d.children && d.children.length > 0) {
            details.push(d.children.map(function (c) {
              var parts = [c.name];
              if (c.age != null) parts.push('age ' + c.age);
              return parts.join(', ');
            }).join(' · '));
          }
          if (d.lastSeenAt) details.push('last seen ' + fmtTime(d.lastSeenAt));
          if (details.length > 0) {
            var sub = document.createElement('div');
            sub.className = 'snippet';
            sub.textContent = details.join(' — ');
            btn.appendChild(sub);
          }

          btn.addEventListener('click', function () { openDevice(d.deviceId); });
          listEl.appendChild(btn);
        });
      }).catch(function (err) {
        if (err && err.status === 401) return;
        setStatus('devicesStatus', 'Error: ' + (err && err.message ? err.message : 'failed'), 'err');
      });
    }

    // ---------- summaries ----------
    function openDevice(deviceId) {
      state.currentDeviceId = deviceId;
      state.offset = 0;
      state.flaggedOffset = 0;
      loadSummaries();
    }

    function loadSummaries() {
      show('summariesView');
      setActiveTab('summaries');
      state.backFromDetail = loadSummaries;
      renderDeviceContext('summariesDeviceContext');
      setStatus('summariesStatus', 'Loading…', 'muted');
      var listEl = document.getElementById('summariesList');
      clearChildren(listEl);

      var url = '/api/conversations/summary'
        + '?deviceId=' + encodeURIComponent(state.currentDeviceId)
        + '&limit=' + PAGE_SIZE
        + '&offset=' + state.offset;

      authedFetch(url).then(function (data) {
        var rows = (data && data.conversations) || [];
        state.lastSummariesPageSize = rows.length;
        if (rows.length === 0) {
          setStatus('summariesStatus',
            state.offset === 0
              ? 'No conversations recorded for this device yet.'
              : 'No more conversations.',
            'muted');
        } else {
          setStatus('summariesStatus', '', '');
          rows.forEach(function (row) {
            listEl.appendChild(buildSummaryRow(row));
          });
        }
        updatePager('newerBtn', 'olderBtn', 'summariesPagerInfo', state.offset, rows.length);
      }).catch(function (err) {
        if (err && err.status === 401) return;
        state.lastSummariesPageSize = 0;
        setStatus('summariesStatus', 'Error: ' + (err && err.message ? err.message : 'failed'), 'err');
        updatePager('newerBtn', 'olderBtn', 'summariesPagerInfo', state.offset, 0);
      });
    }

    function buildSummaryRow(row) {
      var btn = document.createElement('button');
      btn.className = 'row';
      btn.title = row.id;

      var top = document.createElement('div');
      top.className = 'top';

      var leftWrap = document.createElement('span');
      var timeSpan = document.createElement('span');
      timeSpan.textContent = fmtTime(row.startedAt);
      leftWrap.appendChild(timeSpan);
      if (row.hasFlaggedContent) {
        var badge = document.createElement('span');
        badge.className = 'badge';
        badge.textContent = '⚠ flagged';
        leftWrap.appendChild(badge);
      }

      var countSpan = document.createElement('span');
      var count = (typeof row.messageCount === 'number') ? row.messageCount : 0;
      countSpan.textContent = count + (count === 1 ? ' message' : ' messages');

      top.appendChild(leftWrap);
      top.appendChild(countSpan);
      btn.appendChild(top);

      if (row.firstUserSnippet) {
        var u = document.createElement('div');
        u.className = 'snippet';
        u.textContent = 'Child: ' + row.firstUserSnippet;
        btn.appendChild(u);
      }
      if (row.lastAssistantSnippet) {
        var a = document.createElement('div');
        a.className = 'snippet assistant';
        a.textContent = 'Assistant: ' + row.lastAssistantSnippet;
        btn.appendChild(a);
      }

      btn.addEventListener('click', function () { openConversation(row.id); });
      return btn;
    }

    function pageOlder() {
      state.offset += PAGE_SIZE;
      loadSummaries();
    }
    function pageNewer() {
      state.offset = Math.max(0, state.offset - PAGE_SIZE);
      loadSummaries();
    }

    // ---------- flagged ----------
    function loadFlagged() {
      show('flaggedView');
      setActiveTab('flagged');
      state.backFromDetail = loadFlagged;
      renderDeviceContext('flaggedDeviceContext');
      setStatus('flaggedStatus', 'Loading…', 'muted');
      var listEl = document.getElementById('flaggedList');
      clearChildren(listEl);

      var url = '/api/conversations/flagged'
        + '?deviceId=' + encodeURIComponent(state.currentDeviceId)
        + '&limit=' + PAGE_SIZE
        + '&offset=' + state.flaggedOffset;

      authedFetch(url).then(function (data) {
        var rows = (data && data.flaggedMessages) || [];
        state.lastFlaggedPageSize = rows.length;
        if (rows.length === 0) {
          setStatus('flaggedStatus',
            state.flaggedOffset === 0
              ? 'No safety-flagged messages on this device. ✓'
              : 'No more flagged messages.',
            'muted');
        } else {
          setStatus('flaggedStatus', '', '');
          rows.forEach(function (row) {
            listEl.appendChild(buildFlaggedRow(row));
          });
        }
        updatePager('flaggedNewerBtn', 'flaggedOlderBtn', 'flaggedPagerInfo', state.flaggedOffset, rows.length);
      }).catch(function (err) {
        if (err && err.status === 401) return;
        state.lastFlaggedPageSize = 0;
        setStatus('flaggedStatus', 'Error: ' + (err && err.message ? err.message : 'failed'), 'err');
        updatePager('flaggedNewerBtn', 'flaggedOlderBtn', 'flaggedPagerInfo', state.flaggedOffset, 0);
      });
    }

    function buildFlaggedRow(row) {
      var btn = document.createElement('button');
      btn.className = 'row';
      btn.title = row.conversationId || '';

      var top = document.createElement('div');
      top.className = 'top';

      var leftWrap = document.createElement('span');
      var timeSpan = document.createElement('span');
      timeSpan.textContent = fmtTime(row.timestamp);
      leftWrap.appendChild(timeSpan);

      var rightWrap = document.createElement('span');
      var badge = document.createElement('span');
      // safetyFlag may serialize as enum string ("Flagged"/"Blocked") or int (1/2).
      var flag = row.safetyFlag;
      if (flag === 'Blocked' || flag === 2) {
        badge.className = 'badge';
        badge.textContent = '⚠ Blocked';
      } else if (flag === 'Flagged' || flag === 1) {
        badge.className = 'badge warn';
        badge.textContent = '⚠ Flagged';
      } else {
        badge.className = 'badge muted';
        badge.textContent = String(flag == null ? '' : flag);
      }
      rightWrap.appendChild(badge);

      var roleTag = document.createElement('span');
      roleTag.className = 'role-tag';
      roleTag.textContent = String(row.role || '');
      rightWrap.appendChild(roleTag);

      top.appendChild(leftWrap);
      top.appendChild(rightWrap);
      btn.appendChild(top);

      var content = document.createElement('div');
      content.className = 'content-block';
      content.textContent = row.content || '';
      btn.appendChild(content);

      var fromLine = document.createElement('div');
      fromLine.className = 'from-line';
      fromLine.textContent = 'from conversation started ' + fmtTime(row.conversationStartedAt);
      btn.appendChild(fromLine);

      var convId = row.conversationId;
      btn.addEventListener('click', function () { openConversation(convId); });
      return btn;
    }

    function pageOlderFlagged() {
      state.flaggedOffset += PAGE_SIZE;
      loadFlagged();
    }
    function pageNewerFlagged() {
      state.flaggedOffset = Math.max(0, state.flaggedOffset - PAGE_SIZE);
      loadFlagged();
    }

    // ---------- detail ----------
    function openConversation(conversationId) {
      show('detailView');
      var metaEl = document.getElementById('detailMeta');
      var msgsEl = document.getElementById('detailMessages');
      metaEl.textContent = 'Loading…';
      clearChildren(msgsEl);
      setStatus('detailStatus', '', '');

      authedFetch('/api/conversations/' + encodeURIComponent(conversationId)).then(function (data) {
        var c = data && data.conversation;
        if (!c) {
          setStatus('detailStatus', 'Conversation not found.', 'err');
          metaEl.textContent = '';
          return;
        }
        var metaParts = ['Started ' + fmtTime(c.startedAt)];
        if (c.endedAt) metaParts.push('Ended ' + fmtTime(c.endedAt));
        metaParts.push((c.messageCount || 0) + ' messages');
        if (c.hasFlaggedContent) metaParts.push('⚠ contains flagged content');
        metaEl.textContent = metaParts.join(' · ');

        var msgs = c.messages || [];
        if (msgs.length === 0) {
          setStatus('detailStatus', 'No messages in this conversation.', 'muted');
          return;
        }
        msgs.forEach(function (m) {
          msgsEl.appendChild(buildMessage(m));
        });
      }).catch(function (err) {
        if (err && err.status === 401) return;
        metaEl.textContent = '';
        setStatus('detailStatus', 'Error: ' + (err && err.message ? err.message : 'failed'), 'err');
      });
    }

    function buildMessage(m) {
      var div = document.createElement('div');
      div.className = 'msg';
      // Distinguish Flagged (amber/warn) from Blocked (red) in the detail view.
      var flag = m.safetyFlag;
      if (flag === 'Blocked' || flag === 2) {
        div.classList.add('flagged');
      } else if (flag === 'Flagged' || flag === 1) {
        div.classList.add('flagged');
        div.classList.add('warn');
      }

      var meta = document.createElement('div');
      meta.className = 'meta';
      var role = document.createElement('span');
      role.className = 'role';
      role.textContent = roleLabel(m.role);
      var ts = document.createElement('span');
      ts.textContent = fmtTime(m.timestamp);
      meta.appendChild(role);
      meta.appendChild(ts);

      var body = document.createElement('div');
      body.className = 'body';
      body.textContent = m.content || '';

      div.appendChild(meta);
      div.appendChild(body);
      return div;
    }

    function backFromDetail() {
      if (typeof state.backFromDetail === 'function') {
        state.backFromDetail();
      } else {
        loadSummaries();
      }
    }

    // ---------- wiring ----------
    document.getElementById('loginBtn').addEventListener('click', doLogin);
    document.getElementById('passwordInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('logoutBtn').addEventListener('click', doLogout);
    document.getElementById('backToDevices').addEventListener('click', loadDevices);
    document.getElementById('flaggedBackToDevices').addEventListener('click', loadDevices);
    document.getElementById('backFromDetailBtn').addEventListener('click', backFromDetail);
    document.getElementById('olderBtn').addEventListener('click', pageOlder);
    document.getElementById('newerBtn').addEventListener('click', pageNewer);
    document.getElementById('flaggedOlderBtn').addEventListener('click', pageOlderFlagged);
    document.getElementById('flaggedNewerBtn').addEventListener('click', pageNewerFlagged);

    // Tab buttons (in both summaries and flagged views)
    var tabButtons = document.querySelectorAll('.tabs button');
    for (var i = 0; i < tabButtons.length; i++) {
      (function (btn) {
        btn.addEventListener('click', function () {
          var t = btn.getAttribute('data-tab');
          if (t === 'flagged') {
            loadFlagged();
          } else {
            loadSummaries();
          }
        });
      })(tabButtons[i]);
    }

    // ---------- boot ----------
    if (getToken()) {
      loadDevices();
    } else {
      show('loginView');
    }
  })();
  </script>
</body>
</html>
